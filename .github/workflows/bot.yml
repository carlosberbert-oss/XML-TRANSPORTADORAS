name: Bot XML Transportadoras

on:
  # ── JAMEF: 09:30 e 10:30 (Brasília = UTC-3 → 12:30 e 13:30 UTC)
  # ── FITLOG: 14:30 (Brasília → 17:30 UTC)
  # ── MIRA: 15:00 (Brasília → 18:00 UTC)
  schedule:
    - cron: '30 12 * * 1-5'   # JAMEF 09:30 BRT
    - cron: '30 13 * * 1-5'   # JAMEF 10:30 BRT
    - cron: '30 17 * * 1-5'   # FITLOG 14:30 BRT
    - cron: '0 18 * * 1-5'    # MIRA 15:00 BRT

  # Disparo manual (pelo painel ou pelo GitHub)
  workflow_dispatch:
    inputs:
      transportadora:
        description: 'Transportadora (JAMEF | FITLOG TRANSPORTES | MIRA TRANSPORTES)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  rodar-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 libgbm1 libnss3 libxss1 libxtst6 \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libpango-1.0-0 libcairo2

      - name: Instalar Chromium (Playwright)
        run: python -m playwright install chromium

      # Detecta qual transportadora rodar baseado no horário ou input manual
      - name: Detectar transportadora pelo horário
        id: detectar
        run: |
          INPUT="${{ github.event.inputs.transportadora }}"
          if [ -n "$INPUT" ]; then
            echo "transportadora=$INPUT" >> $GITHUB_OUTPUT
          else
            HORA=$(TZ="America/Sao_Paulo" date +"%H:%M")
            echo "Horário BRT: $HORA"
            case "$HORA" in
              "09:30"|"09:3"*) echo "transportadora=JAMEF" >> $GITHUB_OUTPUT ;;
              "10:30"|"10:3"*) echo "transportadora=JAMEF" >> $GITHUB_OUTPUT ;;
              "14:30"|"14:3"*) echo "transportadora=FITLOG TRANSPORTES" >> $GITHUB_OUTPUT ;;
              "15:00"|"15:0"*) echo "transportadora=MIRA TRANSPORTES" >> $GITHUB_OUTPUT ;;
              *) echo "transportadora=JAMEF" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Rodar o bot
        env:
          SISTEMA_EMAIL: ${{ secrets.SISTEMA_EMAIL }}
          SISTEMA_SENHA: ${{ secrets.SISTEMA_SENHA }}
          TRANSPORTADORA: ${{ steps.detectar.outputs.transportadora }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GMAIL_USUARIO: ${{ secrets.GMAIL_USUARIO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_OAUTH_TOKEN: ${{ secrets.GMAIL_OAUTH_TOKEN }}
          JAMEF_EMAIL: ${{ secrets.JAMEF_EMAIL }}
          JAMEF_SENHA: ${{ secrets.JAMEF_SENHA }}
          CI: "true"
        run: python bot.py

      - name: Salvar logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      - name: Commitar histórico atualizado
        if: always()
        run: |
          git config --local user.email "bot@zebrands.mx"
          git config --local user.name "Bot XML Transportadoras"
          git add historico_processados.json
          git diff --staged --quiet || git commit -m "🤖 Histórico atualizado"
          git push
